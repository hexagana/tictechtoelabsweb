// Format bullet text with bold
const formatBullet = (text) => {
  const parts = text.split(/\*\*(.*?)\*\*/g);
  return parts.map((part, i) =>
    i % 2 === 1 ? <strong key={i} style={{color:"#4B2D8E"}}>{part}</strong> : part
  );
};

                  color: "#fff", fontWeight: 700, fontSize: 13, flexShrink: 0
                }}>{t.id}</span>
                <span style={{fontWeight: 500, fontSize: 13, lineHeight: 1.3}}>{t.title}</span>
              </a>
            ))}
          </div>
        </div>

        {/* Topics */}
        {topics.map(topic => (
          <div key={topic.id} id={`topic${topic.id}`} style={{marginBottom: 44}}>
            {/* Topic Header */}
            <div style={{
              background: "linear-gradient(135deg, #4B2D8E, #6B4DAE)",
              borderRadius: "16px 16px 0 0",
              padding: "26px 30px",
            }}>
              <div style={{
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                width: 38, height: 38, borderRadius: 10,
                background: "rgba(255,255,255,0.2)",
                color: "#fff", fontWeight: 800, fontSize: 17, marginBottom: 10
              }}>{topic.id}</div>
              <h2 style={{fontSize: 23, fontWeight: 700, color: "#fff", lineHeight: 1.25, marginBottom: 4}}>
                {topic.icon} {topic.title}
              </h2>
              <div style={{color: "rgba(255,255,255,0.7)", fontSize: 13, marginBottom: 8}}>{topic.subtitle}</div>
              <p style={{color: "rgba(255,255,255,0.85)", fontSize: 14, lineHeight: 1.6, maxWidth: "90%"}}>{topic.description}</p>
            </div>

            <div style={{
              background: "#fff",
              borderRadius: "0 0 16px 16px",
              boxShadow: "0 4px 12px rgba(0,0,0,0.08)",
              overflow: "hidden"
            }}>
              {/* Use Case */}
              <div style={{
                margin: "24px 28px 0",
                padding: "18px 22px",
                background: "linear-gradient(135deg, #F0FAFF, #E8F5FF)",
                borderRadius: 10,
                borderLeft: "4px solid #00B4D8"
              }}>
                <h3 style={{fontSize: 12, fontWeight: 700, color: "#00B4D8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8}}>
                  💼 Use Case Scenarios for Work
                </h3>
                <p style={{color: "#6B6B80", fontSize: 13, lineHeight: 1.7}}>{topic.useCase}</p>
              </div>

              {/* Steps */}
              <div style={{padding: "24px 28px 28px"}}>
                <h3 style={{
                  fontSize: 15, fontWeight: 700, color: "#4B2D8E",
                  marginBottom: 18, paddingBottom: 10,
                  borderBottom: "2px solid #F6F7FB"
                }}>Detailed Step-by-Step Instructions</h3>

                {topic.steps.map((step, si) => (
                  <div key={si} style={{
                    background: "#F6F7FB",
                    borderRadius: 10,
                    padding: "20px 22px",
                    marginBottom: 16,
                    border: "1px solid #E2E4ED"
                  }}>
                    <div style={{
                      fontSize: 15, fontWeight: 700, color: "#4B2D8E",
                      marginBottom: 12, display: "flex", alignItems: "center", gap: 10
                    }}>
                      <span style={{
                        display: "inline-flex", alignItems: "center", justifyContent: "center",
                        width: 26, height: 26, borderRadius: "50%",
                        background: "linear-gradient(135deg, #4B2D8E, #6B4DAE)",
                        color: "#fff", fontSize: 12, fontWeight: 700, flexShrink: 0
                      }}>{step.label}</span>
                      {step.title}
                    </div>

                    <ul style={{listStyle: "none", padding: 0, margin: "0 0 14px 0"}}>
                      {step.bullets.map((b, bi) => (
                        <li key={bi} style={{
                          position: "relative",
                          padding: "4px 0 4px 22px",
                          fontSize: 13,
                          lineHeight: 1.7,
                          color: "#2D2D3A"
                        }}>
                          <span style={{
                            position: "absolute", left: 0,
                            color: "#00B4D8", fontWeight: 700
                          }}>→</span>
                          {formatBullet(b)}
                        </li>
                      ))}
                    </ul>

                    {/* Screenshot SVG */}
                    {step.screenshot && ScreenshotIllustrations[step.screenshot] && (
                      <div style={{
                        marginTop: 12,
                        borderRadius: 8,
                        overflow: "hidden",
                        border: "1px solid #E2E4ED",
                        background: "#1B1B2F"
                      }}>
                        {ScreenshotIllustrations[step.screenshot]()}
                        <div style={{
                          padding: "8px 14px",
                          background: "#EEF0F6",
                          fontSize: 11,
                          fontWeight: 500,
                          color: "#6B6B80"
                        }}>
                          📸 Screenshot illustration: {step.title}
                        </div>
                      </div>
                    )}

                    {/* Tip */}
                    {step.tip && (
                      <div style={{
                        background: "linear-gradient(135deg, #FFFBEB, #FEF3C7)",
                        borderLeft: "4px solid #F59E0B",
                        borderRadius: "0 10px 10px 0",
                        padding: "10px 16px",
                        marginTop: 12,
                        fontSize: 12,
                        color: "#92400E",
                        lineHeight: 1.6
                      }}>
                        <strong style={{color: "#78350F"}}>💡 Pro Tip:</strong> {step.tip}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            </div>
          </div>
        ))}

        {/* Footer */}
        <div style={{textAlign: "center", padding: "32px 20px 48px", color: "#6B6B80", fontSize: 12}}>
          <div style={{fontWeight: 700, color: "#4B2D8E", fontSize: 14, marginBottom: 4}}>
            Microsoft Teams Essentials — Participant Learning Guide
          </div>
          <p>Created by Tic Tech Toe Labs • Follow the steps, master the tools, transform your workflow</p>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TeamsLearningGuide />);
  </script>
</body>
</html>
